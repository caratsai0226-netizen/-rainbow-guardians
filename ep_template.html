<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>彩虹守護隊｜{{EP_TITLE}}</title>

  <style>
    /* 保留原有的專業排版樣式 */
    *{ margin:0; padding:0; box-sizing:border-box; }
    body{
      font-family:"Microsoft JhengHei","PingFang TC",sans-serif;
      background:linear-gradient(180deg,#eaf8ff,#fff7fb);
      color:#333;
    }
    .topbar{
      display:flex; justify-content:space-between; align-items:center;
      padding:18px 28px; background:white;
      box-shadow:0 4px 18px rgba(0,0,0,0.08);
      position:sticky; top:0; z-index:10;
    }
    .topbar a{ color:#2564d8; font-weight:bold; text-decoration:none; font-size:18px; }
    .title{ text-align:center; color:#ff5fa2; font-size:26px; font-weight:bold; }
    .reader{
      min-height:calc(100vh - 80px); display:flex; flex-direction:column;
      align-items:center; justify-content:center; padding:32px 20px;
    }
    .book{
      width:min(96vw,1100px); display:grid; grid-template-columns:1fr 1fr;
      gap:18px; background:white; padding:18px; border-radius:26px;
      box-shadow:0 18px 45px rgba(0,0,0,0.18);
    }
    .page{
      background:#fff; border-radius:18px; overflow:hidden;
      display:flex; align-items:center; justify-content:center; min-height:520px;
    }
    .page img{ width:100%; height:100%; object-fit:contain; display:block; background:white; }
    .controls{ margin-top:24px; display:flex; gap:16px; align-items:center; justify-content:center; flex-wrap:wrap; }
    button{
      border:none; cursor:pointer; padding:14px 28px; border-radius:999px;
      font-size:18px; font-weight:bold; color:white;
      background:linear-gradient(135deg,#ff7ec7,#6ec6ff);
      box-shadow:0 8px 20px rgba(0,0,0,0.16);
    }
    button:disabled{ opacity:0.35; cursor:not-allowed; }
    .page-count{ font-size:18px; color:#555; font-weight:bold; min-width:90px; text-align:center; }

    @media(max-width:768px){
      .topbar{ flex-direction:column; gap:8px; }
      .title{ font-size:22px; }
      .book{ grid-template-columns:1fr; width:94vw; }
      .page{ min-height:auto; }
      button{ font-size:16px; padding:12px 22px; }
    }
  </style>
</head>

<body>

  <div class="topbar">
    <a href="index.html">← 回首頁</a>
    <div class="title">{{EP_FULL_TITLE}}</div>
    <a href="stories.html">故事列表 →</a>
  </div>

  <main class="reader">
    <div class="book">
      <div class="page"><img id="leftPage" src="" alt="左頁插圖"></div>
      <div class="page"><img id="rightPage" src="" alt="右頁文字"></div>
    </div>

    <div class="controls">
      <button id="prevBtn" onclick="prevSpread()">上一頁</button>
      <div class="page-count" id="pageCount"></div>
      <button id="nextBtn" onclick="nextSpread()">下一頁</button>
    </div>
  </main>

  <script>
    // 範本變數設定
    const totalSpreads = {{TOTAL_PAGES}}; 
    let currentSpread = 1;
    const basePath = "{{BASE_PATH}}"; 

    function pad(num){ return String(num).padStart(2, "0"); }

    function updateBook(){
      const n = pad(currentSpread);
      document.getElementById("leftPage").src = `${basePath}s${n}_l.png`;
      document.getElementById("rightPage").src = `${basePath}s${n}_r.png`;
      document.getElementById("pageCount").textContent = `${currentSpread} / ${totalSpreads}`;
      document.getElementById("prevBtn").disabled = currentSpread === 1;
      document.getElementById("nextBtn").disabled = currentSpread === totalSpreads;
    }

    function nextSpread(){ if(currentSpread < totalSpreads){ currentSpread++; updateBook(); } }
    function prevSpread(){ if(currentSpread > 1){ currentSpread--; updateBook(); } }

    updateBook();
  </script>
</body>
</html>
